<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Tasks</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, 'Helvetica Neue', sans-serif; background: #FAF7F2; color: #3A3229; padding: 2rem 1.5rem; min-height: 100vh; }
  .header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 2rem; }
  .page-title { font-size: 26px; font-weight: 600; color: #3A3229; letter-spacing: -0.5px; }
  .page-sub { font-size: 13px; color: #9C8E82; margin-top: 3px; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .refresh-btn { background: none; border: 1px solid #EDE8E1; border-radius: 20px; padding: 7px 14px; font-size: 12px; color: #9C8E82; cursor: pointer; font-family: inherit; }
  .refresh-btn:disabled { opacity: 0.5; pointer-events: none; }
  .add-btn { background: #8B7355; color: white; border: none; border-radius: 20px; padding: 8px 18px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; }
  .add-btn:hover { background: #7A6348; }
  .filter-row { display: flex; gap: 6px; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .filter-btn { font-size: 11px; padding: 4px 12px; border-radius: 20px; border: 1px solid #EDE8E1; background: white; cursor: pointer; font-family: inherit; color: #9C8E82; }
  .filter-btn.active { background: #8B7355; color: white; border-color: #8B7355; }
  .day-group { margin-bottom: 1.75rem; }
  .day-label { font-size: 12px; font-weight: 700; color: #9C8E82; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.7rem; padding-bottom: 7px; border-bottom: 1px solid #EDE8E1; }
  .day-label.today { color: #8B7355; }
  .day-label.overdue { color: #C0614A; }
  .assignment-row { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: #FFFFFF; border: 1px solid #EDE8E1; border-radius: 12px; margin-bottom: 6px; }
  .assignment-row:hover { border-color: #C8BFB5; }
  .assignment-row.submitted { background: #F7F4EF; border-color: #E8E0D5; }
  .class-badge { font-size: 10px; font-weight: 700; padding: 4px 9px; border-radius: 8px; white-space: nowrap; flex-shrink: 0; min-width: 88px; text-align: center; }
  .assignment-name { font-size: 14px; color: #3A3229; flex: 1; }
  .assignment-row.submitted .assignment-name { color: #C0B4A8; text-decoration: line-through; }
  .due-time { font-size: 11px; color: #9C8E82; white-space: nowrap; flex-shrink: 0; }
  .points-badge { font-size: 10px; color: #8B7355; background: #F0EBE3; padding: 2px 7px; border-radius: 6px; white-space: nowrap; flex-shrink: 0; font-weight: 600; }
  .status-btn { font-size: 11px; padding: 4px 11px; border-radius: 8px; border: 1px solid #EDE8E1; background: white; cursor: pointer; font-family: inherit; white-space: nowrap; flex-shrink: 0; color: #6B5E52; font-weight: 500; }
  .status-btn.done { background: #F0F7F0; border-color: #B8D8B8; color: #3A6B3A; }
  .delete-btn { font-size: 15px; padding: 0 6px; border: none; background: none; cursor: pointer; color: #D4C8BC; flex-shrink: 0; }
  .delete-btn:hover { color: #C0614A; }
  .priority-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .priority-dot.high { background: #E88080; }
  .priority-dot.medium { background: #F0B860; }
  .priority-dot.low { background: #88C888; }
  .priority-dot.default { background: #C8BFB5; }
  .empty-state { text-align: center; padding: 3rem 1rem; color: #C0B4A8; }
  .empty-state .ei { font-size: 32px; margin-bottom: 0.75rem; }
  .empty-state p { font-size: 14px; }
  .loading { text-align: center; padding: 3rem 1rem; color: #C0B4A8; font-size: 14px; }
  .sync-note { font-size: 11px; color: #C0B4A8; text-align: center; margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid #EDE8E1; }
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(58,50,41,0.25); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
  .modal-bg.open { display: flex; }
  .modal { background: #FAF7F2; border-radius: 16px; padding: 1.5rem; width: 100%; max-width: 400px; border: 1px solid #EDE8E1; }
  .modal-title { font-size: 16px; font-weight: 600; color: #3A3229; margin-bottom: 1.25rem; }
  .form-group { margin-bottom: 0.9rem; }
  .form-label { font-size: 10px; font-weight: 700; color: #9C8E82; letter-spacing: 0.08em; text-transform: uppercase; display: block; margin-bottom: 5px; }
  .form-input, .form-select { width: 100%; padding: 9px 12px; border: 1px solid #EDE8E1; border-radius: 9px; background: white; font-size: 14px; color: #3A3229; font-family: inherit; outline: none; }
  .form-input:focus, .form-select:focus { border-color: #8B7355; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .modal-btns { display: flex; gap: 8px; margin-top: 1.25rem; }
  .btn-cancel { flex: 1; padding: 10px; border: 1px solid #EDE8E1; border-radius: 9px; background: white; font-size: 13px; color: #9C8E82; cursor: pointer; font-family: inherit; }
  .btn-save { flex: 2; padding: 10px; border: none; border-radius: 9px; background: #8B7355; color: white; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .btn-save:disabled { opacity: 0.6; pointer-events: none; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="page-title">✏️ School Tasks</div>
    <div class="page-sub" id="today-label"></div>
  </div>
  <div class="header-right">
    <button class="refresh-btn" id="rbtn" onclick="load()">↻ Sync</button>
    <button class="add-btn" onclick="openModal()">+ Add</button>
  </div>
</div>

<div class="filter-row">
  <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
  <button class="filter-btn" onclick="setFilter('today',this)">Today</button>
  <button class="filter-btn" onclick="setFilter('upcoming',this)">Upcoming</button>
  <button class="filter-btn" onclick="setFilter('submitted',this)">Submitted</button>
</div>

<div id="list"><div class="loading">Loading... 🌸</div></div>
<div class="sync-note" id="snote">Syncing with Canvas via Zapier 🌸</div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-title">✨ New Assignment</div>
    <div class="form-group"><label class="form-label">Assignment Name</label><input class="form-input" id="fn" placeholder="e.g. Chapter 5 Essay" /></div>
    <div class="form-group">
      <label class="form-label">Class</label>
      <select class="form-select" id="fc">
        <option value="Global Persp">Global Perspectives</option>
        <option value="Media Studies">Media Studies AICE</option>
        <option value="Digital Media">Digital Media</option>
        <option value="English H 3">English Honors 3</option>
        <option value="Algebra H 2">Algebra Honors 2</option>
        <option value="APUSH">APUSH</option>
        <option value="Chem H">Chemistry Honors</option>
        <option value="Other">Other</option>
      </select>
    </div>
    <div class="form-row">
      <div class="form-group"><label class="form-label">Due Date</label><input class="form-input" id="fd" type="date" /></div>
      <div class="form-group"><label class="form-label">Due Time</label><input class="form-input" id="ft" type="time" value="23:59" /></div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Priority</label>
        <select class="form-select" id="fp"><option value="high">🔴 High</option><option value="medium" selected>🟡 Medium</option><option value="low">🟢 Low</option></select>
      </div>
      <div class="form-group"><label class="form-label">Points</label><input class="form-input" id="fpts" type="number" placeholder="100" /></div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" id="sbtn" onclick="addAssignment()">Save ✓</button>
    </div>
  </div>
</div>

<script>
  var BIN_ID = '69c45262b7ec241ddca2bc45';
  var MKEY = '$2a$10$4nY.vjIkSi9.zGP1AEEvoe' + 'E7Bg4lUOhhJLu2RA3KHoPelrLqI5EBC';
  var API = 'https://api.jsonbin.io/v3/b/' + BIN_ID;

  var CLS = {
    'Global Persp':  {bg:'#FEF3E8',c:'#9C5A1D'},
    'Media Studies': {bg:'#EEF2FF',c:'#3730A3'},
    'Digital Media': {bg:'#FDF2F8',c:'#9D174D'},
    'English H 3':   {bg:'#FFF0F3',c:'#BE185D'},
    'Algebra H 2':   {bg:'#F0FDF4',c:'#166534'},
    'APUSH':         {bg:'#FFF7ED',c:'#9A3412'},
    'Chem H':        {bg:'#F0F9FF',c:'#075985'},
    'Other':         {bg:'#F5F5F4',c:'#57534E'}
  };

  var DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var MONS=['January','February','March','April','May','June','July','August','September','October','November','December'];
  var now=new Date();
  document.getElementById('today-label').textContent=DAYS[now.getDay()]+', '+MONS[now.getMonth()]+' '+now.getDate();
  document.getElementById('fd').value=now.toISOString().split('T')[0];

  var data=[], filter='all';

  function fmt(t){if(!t)return'11:59 PM';var p=t.split(':'),h=parseInt(p[0]),m=p[1];return(h%12||12)+':'+m+(h>=12?' PM':' AM');}
  function dinfo(d){var dt=new Date(d+'T00:00:00'),td=new Date();td.setHours(0,0,0,0);var diff=Math.round((dt-td)/864e5);if(diff<0)return{l:'⚠️ Overdue',c:'overdue'};if(diff===0)return{l:'Today — '+MONS[dt.getMonth()]+' '+dt.getDate(),c:'today'};if(diff===1)return{l:'Tomorrow — '+MONS[dt.getMonth()]+' '+dt.getDate(),c:'soon'};return{l:DAYS[dt.getDay()]+', '+MONS[dt.getMonth()]+' '+dt.getDate(),c:'future'};}

  function setFilter(f,btn){filter=f;document.querySelectorAll('.filter-btn').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');render();}

  function filtered(){var td=new Date();td.setHours(0,0,0,0);return data.filter(function(a){if(filter==='submitted')return a.done;if(filter==='today'){var d=new Date(a.date+'T00:00:00');return!a.done&&Math.round((d-td)/864e5)===0;}if(filter==='upcoming'){var d=new Date(a.date+'T00:00:00');return!a.done&&Math.round((d-td)/864e5)>0;}return true;});}

  async function load(){
    var btn=document.getElementById('rbtn');btn.disabled=true;btn.textContent='...';
    try{
      var r=await fetch(API+'/latest',{headers:{'X-Master-Key':MKEY,'X-Bin-Meta':'false'}});
      if(r.ok){var j=await r.json();data=j.assignments||[];document.getElementById('snote').textContent='Last synced: '+new Date().toLocaleTimeString()+' 🌸';}
    }catch(e){}
    btn.disabled=false;btn.textContent='↻ Sync';render();
  }

  async function save(){
    try{await fetch(API,{method:'PUT',headers:{'Content-Type':'application/json','X-Master-Key':MKEY},body:JSON.stringify({assignments:data})});}catch(e){}
  }

  function render(){
    var el=document.getElementById('list'),f=filtered();
    if(!f.length){var msgs={all:'No assignments yet — Canvas will sync automatically!',today:'Nothing due today 🌸',upcoming:'No upcoming 🌸',submitted:'None submitted yet'};el.innerHTML='<div class="empty-state"><div class="ei">🌸</div><p>'+(msgs[filter]||'Nothing')+'</p></div>';return;}
    var sorted=f.slice().sort(function(a,b){return new Date(a.date)-new Date(b.date);});
    var groups={},order=[];
    sorted.forEach(function(a){if(!groups[a.date]){groups[a.date]=[];order.push(a.date);}groups[a.date].push(a);});
    el.innerHTML='';
    order.forEach(function(date){
      var info=dinfo(date);
      var g=document.createElement('div');g.className='day-group';
      var lbl=document.createElement('div');lbl.className='day-label '+info.c;lbl.textContent=info.l;g.appendChild(lbl);
      groups[date].forEach(function(a){
        var row=document.createElement('div');row.className='assignment-row'+(a.done?' submitted':'');
        var cs=CLS[a.cls]||CLS['Other'];
        var badge=document.createElement('div');badge.className='class-badge';badge.style.background=cs.bg;badge.style.color=cs.c;badge.textContent=a.cls;
        var dot=document.createElement('div');dot.className='priority-dot '+(a.priority||'default');
        var nm=document.createElement('div');nm.className='assignment-name';nm.textContent=a.name;
        var ti=document.createElement('div');ti.className='due-time';ti.textContent='Due '+fmt(a.time);
        var right=document.createElement('div');right.style.cssText='display:flex;align-items:center;gap:6px;flex-shrink:0;';
        if(a.points){var pts=document.createElement('div');pts.className='points-badge';pts.textContent=a.points+' pts';right.appendChild(pts);}
        var sb=document.createElement('button');sb.className='status-btn'+(a.done?' done':'');sb.textContent=a.done?'✓ Submitted':'Mark Done';
        sb.onclick=(function(id){return function(e){e.stopPropagation();toggle(id);};})(a.id);
        var db=document.createElement('button');db.className='delete-btn';db.textContent='×';
        db.onclick=(function(id){return function(e){e.stopPropagation();del(id);};})(a.id);
        right.appendChild(sb);right.appendChild(db);
        row.appendChild(badge);row.appendChild(dot);row.appendChild(nm);row.appendChild(ti);row.appendChild(right);g.appendChild(row);
      });
      el.appendChild(g);
    });
  }

  async function toggle(id){var a=data.find(function(x){return x.id===id;});if(a){a.done=!a.done;render();await save();}}
  async function del(id){data=data.filter(function(x){return x.id!==id;});render();await save();}

  function openModal(){document.getElementById('modal').classList.add('open');document.getElementById('fn').focus();}
  function closeModal(){document.getElementById('modal').classList.remove('open');document.getElementById('fn').value='';document.getElementById('fpts').value='';document.getElementById('sbtn').disabled=false;document.getElementById('sbtn').textContent='Save ✓';}

  async function addAssignment(){
    var name=document.getElementById('fn').value.trim(),date=document.getElementById('fd').value;
    if(!name||!date){alert('Please enter a name and due date');return;}
    var btn=document.getElementById('sbtn');btn.disabled=true;btn.textContent='Saving...';
    data.push({id:Date.now().toString(),name:name,cls:document.getElementById('fc').value,date:date,time:document.getElementById('ft').value,priority:document.getElementById('fp').value,points:document.getElementById('fpts').value||'',done:false,source:'manual'});
    await save();closeModal();render();
  }

  document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
  load();
</script>
</body>
</html>
