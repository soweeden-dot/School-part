<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Tasks</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, 'Helvetica Neue', sans-serif; background: #FAF7F2; color: #3A3229; padding: 2rem 1.5rem; min-height: 100vh; }
  .header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 2rem; }
  .page-title { font-size: 26px; font-weight: 600; color: #3A3229; letter-spacing: -0.5px; }
  .page-sub { font-size: 13px; color: #9C8E82; margin-top: 3px; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .refresh-btn { background: none; border: 1px solid #EDE8E1; border-radius: 20px; padding: 7px 14px; font-size: 12px; color: #9C8E82; cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .refresh-btn:hover { border-color: #C8BFB5; color: #6B5E52; }
  .refresh-btn:disabled { opacity: 0.5; pointer-events: none; }
  .add-btn { background: #8B7355; color: white; border: none; border-radius: 20px; padding: 8px 18px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; }
  .add-btn:hover { background: #7A6348; }
  .day-group { margin-bottom: 1.75rem; }
  .day-label { font-size: 12px; font-weight: 700; color: #9C8E82; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.7rem; padding-bottom: 7px; border-bottom: 1px solid #EDE8E1; }
  .day-label.today { color: #8B7355; }
  .day-label.overdue { color: #C0614A; }
  .assignment-row { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: #FFFFFF; border: 1px solid #EDE8E1; border-radius: 12px; margin-bottom: 6px; transition: border-color 0.15s; }
  .assignment-row:hover { border-color: #C8BFB5; }
  .assignment-row.submitted { background: #F7F4EF; border-color: #E8E0D5; }
  .class-badge { font-size: 10px; font-weight: 700; padding: 4px 9px; border-radius: 8px; white-space: nowrap; flex-shrink: 0; min-width: 88px; text-align: center; }
  .assignment-name { font-size: 14px; color: #3A3229; flex: 1; }
  .assignment-row.submitted .assignment-name { color: #C0B4A8; text-decoration: line-through; text-decoration-color: #D4C8BC; }
  .due-time { font-size: 11px; color: #9C8E82; white-space: nowrap; flex-shrink: 0; }
  .points-badge { font-size: 10px; color: #8B7355; background: #F0EBE3; padding: 2px 7px; border-radius: 6px; white-space: nowrap; flex-shrink: 0; font-weight: 600; }
  .status-btn { font-size: 11px; padding: 4px 11px; border-radius: 8px; border: 1px solid #EDE8E1; background: white; cursor: pointer; font-family: inherit; white-space: nowrap; flex-shrink: 0; transition: all 0.15s; color: #6B5E52; font-weight: 500; }
  .status-btn:hover { border-color: #C8BFB5; }
  .status-btn.done { background: #F0F7F0; border-color: #B8D8B8; color: #3A6B3A; }
  .priority-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .priority-dot.high { background: #E88080; }
  .priority-dot.medium { background: #F0B860; }
  .priority-dot.low { background: #88C888; }
  .priority-dot.default { background: #C8BFB5; }
  .empty-state { text-align: center; padding: 3rem 1rem; color: #C0B4A8; }
  .empty-state .empty-icon { font-size: 32px; margin-bottom: 0.75rem; }
  .empty-state p { font-size: 14px; }
  .loading { text-align: center; padding: 3rem 1rem; color: #C0B4A8; font-size: 14px; }
  .error-msg { background: #FFF0EE; border: 1px solid #F5C5BC; border-radius: 10px; padding: 12px 16px; font-size: 13px; color: #C0614A; margin-bottom: 1rem; }
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(58,50,41,0.25); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
  .modal-bg.open { display: flex; }
  .modal { background: #FAF7F2; border-radius: 16px; padding: 1.5rem; width: 100%; max-width: 400px; border: 1px solid #EDE8E1; }
  .modal-title { font-size: 16px; font-weight: 600; color: #3A3229; margin-bottom: 1.25rem; }
  .form-group { margin-bottom: 0.9rem; }
  .form-label { font-size: 10px; font-weight: 700; color: #9C8E82; letter-spacing: 0.08em; text-transform: uppercase; display: block; margin-bottom: 5px; }
  .form-input, .form-select { width: 100%; padding: 9px 12px; border: 1px solid #EDE8E1; border-radius: 9px; background: white; font-size: 14px; color: #3A3229; font-family: inherit; outline: none; transition: border-color 0.15s; }
  .form-input:focus, .form-select:focus { border-color: #8B7355; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .modal-btns { display: flex; gap: 8px; margin-top: 1.25rem; }
  .btn-cancel { flex: 1; padding: 10px; border: 1px solid #EDE8E1; border-radius: 9px; background: white; font-size: 13px; color: #9C8E82; cursor: pointer; font-family: inherit; }
  .btn-save { flex: 2; padding: 10px; border: none; border-radius: 9px; background: #8B7355; color: white; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .btn-save:hover { background: #7A6348; }
  .btn-save:disabled { opacity: 0.6; pointer-events: none; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="page-title">✏️ School Tasks</div>
    <div class="page-sub" id="today-label"></div>
  </div>
  <div class="header-right">
    <button class="refresh-btn" onclick="loadAssignments()" id="refresh-btn">↻ Refresh</button>
    <button class="add-btn" onclick="openModal()">+ Add</button>
  </div>
</div>

<div id="error-container"></div>
<div id="assignments-list"><div class="loading">Loading your assignments... 🌸</div></div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-title">✨ New Assignment</div>
    <div class="form-group">
      <label class="form-label">Assignment Name</label>
      <input class="form-input" id="f-name" placeholder="e.g. Chapter 5 Essay" />
    </div>
    <div class="form-group">
      <label class="form-label">Class</label>
      <select class="form-select" id="f-class">
        <option value="Global Persp">Global Perspectives</option>
        <option value="Media Studies">Media Studies AICE</option>
        <option value="Digital Media">Digital Media</option>
        <option value="English H 3">English Honors 3</option>
        <option value="Algebra H 2">Algebra Honors 2</option>
        <option value="APUSH">APUSH</option>
        <option value="Chem H">Chemistry Honors</option>
        <option value="Other">Other</option>
      </select>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Due Date</label>
        <input class="form-input" id="f-date" type="date" />
      </div>
      <div class="form-group">
        <label class="form-label">Due Time</label>
        <input class="form-input" id="f-time" type="time" value="23:59" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Priority</label>
        <select class="form-select" id="f-priority">
          <option value="High">🔴 High</option>
          <option value="Medium" selected>🟡 Medium</option>
          <option value="Low">🟢 Low</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Points</label>
        <input class="form-input" id="f-points" type="number" placeholder="100" />
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" id="save-btn" onclick="saveAssignment()">Save ✓</button>
    </div>
  </div>
</div>

<script>
  var TOKEN = atob('bnRuXzUxNjQ4OTk1NTgwMk15TDJrSFlMSGFrT2hPcllpWm1DU2JVaVM5WXFhbWQ0S1g=');
  var DB_ID = 'eb81ea2d05e04370b660ea61fc6d1184';

  // Try multiple proxies in order
  var PROXIES = [
    'https://api.allorigins.win/raw?url=',
    'https://corsproxy.io/?url=',
    'https://thingproxy.freeboard.io/fetch/'
  ];

  var CLASSES = {
    'Global Persp':  { bg: '#FEF3E8', color: '#9C5A1D' },
    'Media Studies': { bg: '#EEF2FF', color: '#3730A3' },
    'Digital Media': { bg: '#FDF2F8', color: '#9D174D' },
    'English H 3':   { bg: '#FFF0F3', color: '#BE185D' },
    'Algebra H 2':   { bg: '#F0FDF4', color: '#166534' },
    'APUSH':         { bg: '#FFF7ED', color: '#9A3412' },
    'Chem H':        { bg: '#F0F9FF', color: '#075985' },
    'Other':         { bg: '#F5F5F4', color: '#57534E' }
  };

  var DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  var now = new Date();
  document.getElementById('today-label').textContent = DAYS[now.getDay()] + ', ' + MONTHS[now.getMonth()] + ' ' + now.getDate();
  document.getElementById('f-date').value = now.toISOString().split('T')[0];

  function showError(msg) { document.getElementById('error-container').innerHTML = '<div class="error-msg">' + msg + '</div>'; }
  function clearError() { document.getElementById('error-container').innerHTML = ''; }

  function fmtTime(dateStr) {
    if (!dateStr || !dateStr.includes('T')) return '';
    var d = new Date(dateStr);
    var h = d.getHours(); var m = d.getMinutes();
    return (h%12||12) + ':' + (m<10?'0'+m:m) + (h>=12?' PM':' AM');
  }

  function dayInfo(dateStr) {
    if (!dateStr) return { label: 'No Due Date', cls: '' };
    var d = new Date(dateStr.includes('T') ? dateStr : dateStr + 'T00:00:00');
    var today = new Date(); today.setHours(0,0,0,0);
    var diff = Math.round((d - today) / 864e5);
    if (diff < 0) return { label: '⚠️ Overdue', cls: 'overdue' };
    if (diff === 0) return { label: 'Today — ' + MONTHS[d.getMonth()] + ' ' + d.getDate(), cls: 'today' };
    if (diff === 1) return { label: 'Tomorrow — ' + MONTHS[d.getMonth()] + ' ' + d.getDate(), cls: 'soon' };
    return { label: DAYS[d.getDay()] + ', ' + MONTHS[d.getMonth()] + ' ' + d.getDate(), cls: 'future' };
  }

  async function notionRequest(endpoint, method, body) {
    var url = 'https://api.notion.com/v1/' + endpoint;
    var opts = {
      method: method || 'GET',
      headers: {
        'Authorization': 'Bearer ' + TOKEN,
        'Notion-Version': '2022-06-28',
        'Content-Type': 'application/json'
      }
    };
    if (body) opts.body = JSON.stringify(body);

    // Try each proxy
    for (var i = 0; i < PROXIES.length; i++) {
      try {
        var res = await fetch(PROXIES[i] + encodeURIComponent(url), opts);
        if (res.ok) return await res.json();
      } catch(e) { continue; }
    }
    throw new Error('All proxies failed');
  }

  async function loadAssignments() {
    var btn = document.getElementById('refresh-btn');
    btn.disabled = true; btn.textContent = '↻ Loading...';
    clearError();
    document.getElementById('assignments-list').innerHTML = '<div class="loading">Loading your assignments... 🌸</div>';
    try {
      var data = await notionRequest('databases/' + DB_ID + '/query', 'POST', {
        sorts: [{ property: 'Due Date', direction: 'ascending' }],
        page_size: 100
      });
      renderAssignments(data.results || []);
    } catch(e) {
      showError('Could not connect — tap Refresh to try again.');
      document.getElementById('assignments-list').innerHTML = '<div class="empty-state"><div class="empty-icon">🌸</div><p>Nothing to show right now</p></div>';
    }
    btn.disabled = false; btn.textContent = '↻ Refresh';
  }

  function renderAssignments(pages) {
    var el = document.getElementById('assignments-list');
    if (!pages.length) {
      el.innerHTML = '<div class="empty-state"><div class="empty-icon">🌸</div><p>No assignments yet — Canvas will sync them automatically!</p></div>';
      return;
    }
    var groups = {}, order = [];
    pages.forEach(function(p) {
      var dateVal = p.properties['Due Date'] && p.properties['Due Date'].date ? p.properties['Due Date'].date.start : null;
      var key = dateVal ? dateVal.split('T')[0] : 'no-date';
      if (!groups[key]) { groups[key] = []; order.push(key); }
      groups[key].push(p);
    });
    el.innerHTML = '';
    order.forEach(function(key) {
      var info = dayInfo(key === 'no-date' ? null : key);
      var g = document.createElement('div'); g.className = 'day-group';
      var lbl = document.createElement('div'); lbl.className = 'day-label ' + info.cls; lbl.textContent = info.label;
      g.appendChild(lbl);
      groups[key].forEach(function(p) {
        var props = p.properties;
        var name = props['Assignment'] && props['Assignment'].title[0] ? props['Assignment'].title[0].plain_text : 'Untitled';
        var cls = props['Class'] && props['Class'].select ? props['Class'].select.name : 'Other';
        var status = props['Status'] && props['Status'].select ? props['Status'].select.name : 'Backlog';
        var priority = props['Priority'] && props['Priority'].select ? props['Priority'].select.name.toLowerCase() : 'default';
        var points = props['Points'] && props['Points'].number;
        var dateStr = props['Due Date'] && props['Due Date'].date ? props['Due Date'].date.start : null;
        var isSubmitted = status === 'Submitted';
        var row = document.createElement('div'); row.className = 'assignment-row' + (isSubmitted ? ' submitted' : '');
        var cs = CLASSES[cls] || CLASSES['Other'];
        var badge = document.createElement('div'); badge.className = 'class-badge';
        badge.style.background = cs.bg; badge.style.color = cs.color; badge.textContent = cls;
        var dot = document.createElement('div'); dot.className = 'priority-dot ' + priority;
        var nameEl = document.createElement('div'); nameEl.className = 'assignment-name'; nameEl.textContent = name;
        var time = document.createElement('div'); time.className = 'due-time';
        var t = fmtTime(dateStr); if (t) time.textContent = 'Due ' + t;
        var right = document.createElement('div'); right.style.cssText = 'display:flex;align-items:center;gap:6px;flex-shrink:0;';
        if (points) { var pts = document.createElement('div'); pts.className = 'points-badge'; pts.textContent = points + ' pts'; right.appendChild(pts); }
        var btn = document.createElement('button'); btn.className = 'status-btn' + (isSubmitted ? ' done' : '');
        btn.textContent = isSubmitted ? '✓ Submitted' : 'Mark Done';
        btn.onclick = (function(id, sub) { return function(e) { e.stopPropagation(); updateStatus(id, sub ? 'Backlog' : 'Submitted'); }; })(p.id, isSubmitted);
        right.appendChild(btn);
        row.appendChild(badge); row.appendChild(dot); row.appendChild(nameEl); row.appendChild(time); row.appendChild(right);
        g.appendChild(row);
      });
      el.appendChild(g);
    });
  }

  async function updateStatus(pageId, newStatus) {
    try {
      await notionRequest('pages/' + pageId, 'PATCH', {
        properties: { 'Status': { select: { name: newStatus } } }
      });
      loadAssignments();
    } catch(e) { showError('Could not update. Please try again.'); }
  }

  function openModal() { document.getElementById('modal').classList.add('open'); document.getElementById('f-name').focus(); }
  function closeModal() {
    document.getElementById('modal').classList.remove('open');
    document.getElementById('f-name').value = ''; document.getElementById('f-points').value = '';
    document.getElementById('save-btn').disabled = false; document.getElementById('save-btn').textContent = 'Save ✓';
  }

  async function saveAssignment() {
    var name = document.getElementById('f-name').value.trim();
    var date = document.getElementById('f-date').value;
    var time = document.getElementById('f-time').value;
    if (!name || !date) { alert('Please enter a name and due date'); return; }
    var btn = document.getElementById('save-btn'); btn.disabled = true; btn.textContent = 'Saving...';
    var props = {
      'Assignment': { title: [{ text: { content: name } }] },
      'Class': { select: { name: document.getElementById('f-class').value } },
      'Due Date': { date: { start: date + 'T' + time + ':00.000-05:00' } },
      'Priority': { select: { name: document.getElementById('f-priority').value } },
      'Status': { select: { name: 'Backlog' } }
    };
    var pts = document.getElementById('f-points').value;
    if (pts) props['Points'] = { number: parseInt(pts) };
    try {
      await notionRequest('pages', 'POST', { parent: { database_id: DB_ID }, properties: props });
      closeModal(); loadAssignments();
    } catch(e) { showError('Could not save. Please try again.'); btn.disabled = false; btn.textContent = 'Save ✓'; }
  }

  document.getElementById('modal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
  loadAssignments();
</script>
</body>
</html>
