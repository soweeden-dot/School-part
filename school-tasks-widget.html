<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Tasks</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, 'Helvetica Neue', sans-serif; background: #FAF7F2; color: #3A3229; padding: 2rem 1.5rem; min-height: 100vh; }
  .header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 2rem; }
  .page-title { font-size: 26px; font-weight: 600; color: #3A3229; letter-spacing: -0.5px; }
  .page-sub { font-size: 13px; color: #9C8E82; margin-top: 3px; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .add-btn { background: #8B7355; color: white; border: none; border-radius: 20px; padding: 8px 18px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: inherit; }
  .add-btn:hover { background: #7A6348; }
  .day-group { margin-bottom: 1.75rem; }
  .day-label { font-size: 12px; font-weight: 700; color: #9C8E82; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.7rem; padding-bottom: 7px; border-bottom: 1px solid #EDE8E1; }
  .day-label.today { color: #8B7355; }
  .day-label.overdue { color: #C0614A; }
  .assignment-row { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: #FFFFFF; border: 1px solid #EDE8E1; border-radius: 12px; margin-bottom: 6px; transition: border-color 0.15s; }
  .assignment-row:hover { border-color: #C8BFB5; }
  .assignment-row.submitted { background: #F7F4EF; border-color: #E8E0D5; }
  .class-badge { font-size: 10px; font-weight: 700; padding: 4px 9px; border-radius: 8px; white-space: nowrap; flex-shrink: 0; min-width: 88px; text-align: center; }
  .assignment-name { font-size: 14px; color: #3A3229; flex: 1; }
  .assignment-row.submitted .assignment-name { color: #C0B4A8; text-decoration: line-through; text-decoration-color: #D4C8BC; }
  .due-time { font-size: 11px; color: #9C8E82; white-space: nowrap; flex-shrink: 0; }
  .points-badge { font-size: 10px; color: #8B7355; background: #F0EBE3; padding: 2px 7px; border-radius: 6px; white-space: nowrap; flex-shrink: 0; font-weight: 600; }
  .status-btn { font-size: 11px; padding: 4px 11px; border-radius: 8px; border: 1px solid #EDE8E1; background: white; cursor: pointer; font-family: inherit; white-space: nowrap; flex-shrink: 0; transition: all 0.15s; color: #6B5E52; font-weight: 500; }
  .status-btn:hover { border-color: #C8BFB5; }
  .status-btn.done { background: #F0F7F0; border-color: #B8D8B8; color: #3A6B3A; }
  .delete-btn { font-size: 11px; padding: 4px 8px; border-radius: 8px; border: 1px solid #EDE8E1; background: white; cursor: pointer; font-family: inherit; color: #C8BFB5; transition: all 0.15s; flex-shrink: 0; }
  .delete-btn:hover { color: #C0614A; border-color: #F5C5BC; background: #FFF0EE; }
  .priority-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .priority-dot.high { background: #E88080; }
  .priority-dot.medium { background: #F0B860; }
  .priority-dot.low { background: #88C888; }
  .priority-dot.default { background: #C8BFB5; }
  .empty-state { text-align: center; padding: 3rem 1rem; color: #C0B4A8; }
  .empty-state .empty-icon { font-size: 32px; margin-bottom: 0.75rem; }
  .empty-state p { font-size: 14px; }
  .filter-row { display: flex; gap: 6px; margin-bottom: 1.25rem; flex-wrap: wrap; }
  .filter-btn { font-size: 11px; padding: 4px 12px; border-radius: 20px; border: 1px solid #EDE8E1; background: white; cursor: pointer; font-family: inherit; color: #9C8E82; transition: all 0.15s; }
  .filter-btn:hover { border-color: #C8BFB5; }
  .filter-btn.active { background: #8B7355; color: white; border-color: #8B7355; }
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(58,50,41,0.25); z-index: 100; align-items: center; justify-content: center; padding: 1rem; }
  .modal-bg.open { display: flex; }
  .modal { background: #FAF7F2; border-radius: 16px; padding: 1.5rem; width: 100%; max-width: 400px; border: 1px solid #EDE8E1; }
  .modal-title { font-size: 16px; font-weight: 600; color: #3A3229; margin-bottom: 1.25rem; }
  .form-group { margin-bottom: 0.9rem; }
  .form-label { font-size: 10px; font-weight: 700; color: #9C8E82; letter-spacing: 0.08em; text-transform: uppercase; display: block; margin-bottom: 5px; }
  .form-input, .form-select { width: 100%; padding: 9px 12px; border: 1px solid #EDE8E1; border-radius: 9px; background: white; font-size: 14px; color: #3A3229; font-family: inherit; outline: none; transition: border-color 0.15s; }
  .form-input:focus, .form-select:focus { border-color: #8B7355; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .modal-btns { display: flex; gap: 8px; margin-top: 1.25rem; }
  .btn-cancel { flex: 1; padding: 10px; border: 1px solid #EDE8E1; border-radius: 9px; background: white; font-size: 13px; color: #9C8E82; cursor: pointer; font-family: inherit; }
  .btn-save { flex: 2; padding: 10px; border: none; border-radius: 9px; background: #8B7355; color: white; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .btn-save:hover { background: #7A6348; }
  .sync-note { font-size: 11px; color: #C0B4A8; text-align: center; margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid #EDE8E1; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="page-title">✏️ School Tasks</div>
    <div class="page-sub" id="today-label"></div>
  </div>
  <div class="header-right">
    <button class="add-btn" onclick="openModal()">+ Add</button>
  </div>
</div>

<div class="filter-row">
  <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
  <button class="filter-btn" onclick="setFilter('today', this)">Today</button>
  <button class="filter-btn" onclick="setFilter('upcoming', this)">Upcoming</button>
  <button class="filter-btn" onclick="setFilter('submitted', this)">Submitted</button>
</div>

<div id="assignments-list"></div>
<div class="sync-note">Canvas assignments sync automatically via Zapier 🌸</div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-title">✨ New Assignment</div>
    <div class="form-group">
      <label class="form-label">Assignment Name</label>
      <input class="form-input" id="f-name" placeholder="e.g. Chapter 5 Essay" />
    </div>
    <div class="form-group">
      <label class="form-label">Class</label>
      <select class="form-select" id="f-class">
        <option value="Global Persp">Global Perspectives</option>
        <option value="Media Studies">Media Studies AICE</option>
        <option value="Digital Media">Digital Media</option>
        <option value="English H 3">English Honors 3</option>
        <option value="Algebra H 2">Algebra Honors 2</option>
        <option value="APUSH">APUSH</option>
        <option value="Chem H">Chemistry Honors</option>
        <option value="Other">Other</option>
      </select>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Due Date</label>
        <input class="form-input" id="f-date" type="date" />
      </div>
      <div class="form-group">
        <label class="form-label">Due Time</label>
        <input class="form-input" id="f-time" type="time" value="23:59" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Priority</label>
        <select class="form-select" id="f-priority">
          <option value="high">🔴 High</option>
          <option value="medium" selected>🟡 Medium</option>
          <option value="low">🟢 Low</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Points</label>
        <input class="form-input" id="f-points" type="number" placeholder="100" />
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveAssignment()">Save ✓</button>
    </div>
  </div>
</div>

<script>
  var CLASSES = {
    'Global Persp':  { bg: '#FEF3E8', color: '#9C5A1D' },
    'Media Studies': { bg: '#EEF2FF', color: '#3730A3' },
    'Digital Media': { bg: '#FDF2F8', color: '#9D174D' },
    'English H 3':   { bg: '#FFF0F3', color: '#BE185D' },
    'Algebra H 2':   { bg: '#F0FDF4', color: '#166534' },
    'APUSH':         { bg: '#FFF7ED', color: '#9A3412' },
    'Chem H':        { bg: '#F0F9FF', color: '#075985' },
    'Other':         { bg: '#F5F5F4', color: '#57534E' }
  };

  var DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  var now = new Date();
  document.getElementById('today-label').textContent = DAYS[now.getDay()] + ', ' + MONTHS[now.getMonth()] + ' ' + now.getDate();
  document.getElementById('f-date').value = now.toISOString().split('T')[0];

  var assignments = JSON.parse(localStorage.getItem('school_assignments_v3') || '[]');
  var currentFilter = 'all';

  function save() { localStorage.setItem('school_assignments_v3', JSON.stringify(assignments)); }

  function fmtTime(t) {
    if (!t) return '11:59 PM';
    var p = t.split(':'), h = parseInt(p[0]), m = p[1];
    return (h%12||12) + ':' + m + (h>=12?' PM':' AM');
  }

  function dayInfo(dateStr) {
    var d = new Date(dateStr + 'T00:00:00');
    var today = new Date(); today.setHours(0,0,0,0);
    var diff = Math.round((d - today) / 864e5);
    if (diff < 0) return { label: '⚠️ Overdue', cls: 'overdue', diff: diff };
    if (diff === 0) return { label: 'Today — ' + MONTHS[d.getMonth()] + ' ' + d.getDate(), cls: 'today', diff: 0 };
    if (diff === 1) return { label: 'Tomorrow — ' + MONTHS[d.getMonth()] + ' ' + d.getDate(), cls: 'soon', diff: 1 };
    return { label: DAYS[d.getDay()] + ', ' + MONTHS[d.getMonth()] + ' ' + d.getDate(), cls: 'future', diff: diff };
  }

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    render();
  }

  function getFiltered() {
    var today = new Date(); today.setHours(0,0,0,0);
    return assignments.filter(function(a) {
      if (currentFilter === 'submitted') return a.done;
      if (currentFilter === 'today') {
        var d = new Date(a.date + 'T00:00:00');
        return !a.done && Math.round((d-today)/864e5) === 0;
      }
      if (currentFilter === 'upcoming') {
        var d = new Date(a.date + 'T00:00:00');
        return !a.done && Math.round((d-today)/864e5) > 0;
      }
      return true; // all
    });
  }

  function render() {
    var el = document.getElementById('assignments-list');
    var filtered = getFiltered();
    
    if (!filtered.length) {
      var msgs = {
        all: 'No assignments yet — tap + Add or wait for Canvas to sync!',
        today: 'Nothing due today 🌸',
        upcoming: 'No upcoming assignments 🌸',
        submitted: 'No submitted assignments yet'
      };
      el.innerHTML = '<div class="empty-state"><div class="empty-icon">🌸</div><p>' + (msgs[currentFilter] || 'Nothing here') + '</p></div>';
      return;
    }

    var sorted = filtered.slice().sort(function(a,b) { return new Date(a.date) - new Date(b.date); });
    var groups = {}, order = [];
    sorted.forEach(function(a) {
      if (!groups[a.date]) { groups[a.date] = []; order.push(a.date); }
      groups[a.date].push(a);
    });

    el.innerHTML = '';
    order.forEach(function(date) {
      var info = dayInfo(date);
      var g = document.createElement('div'); g.className = 'day-group';
      var lbl = document.createElement('div'); lbl.className = 'day-label ' + info.cls; lbl.textContent = info.label;
      g.appendChild(lbl);

      groups[date].forEach(function(a) {
        var row = document.createElement('div'); row.className = 'assignment-row' + (a.done?' submitted':'');
        var cs = CLASSES[a.cls] || CLASSES['Other'];

        var badge = document.createElement('div'); badge.className = 'class-badge';
        badge.style.background = cs.bg; badge.style.color = cs.color; badge.textContent = a.cls;

        var dot = document.createElement('div'); dot.className = 'priority-dot '+(a.priority||'default');

        var name = document.createElement('div'); name.className = 'assignment-name'; name.textContent = a.name;

        var time = document.createElement('div'); time.className = 'due-time'; time.textContent = 'Due '+fmtTime(a.time);

        var right = document.createElement('div'); right.style.cssText = 'display:flex;align-items:center;gap:6px;flex-shrink:0;';

        if (a.points) { var pts = document.createElement('div'); pts.className = 'points-badge'; pts.textContent = a.points+' pts'; right.appendChild(pts); }

        var statusBtn = document.createElement('button'); statusBtn.className = 'status-btn'+(a.done?' done':'');
        statusBtn.textContent = a.done ? '✓ Submitted' : 'Mark Done';
        statusBtn.onclick = (function(id) { return function(e) { e.stopPropagation(); toggleDone(id); }; })(a.id);

        var delBtn = document.createElement('button'); delBtn.className = 'delete-btn';
        delBtn.textContent = '×';
        delBtn.onclick = (function(id) { return function(e) { e.stopPropagation(); deleteAssignment(id); }; })(a.id);

        right.appendChild(statusBtn); right.appendChild(delBtn);
        row.appendChild(badge); row.appendChild(dot); row.appendChild(name); row.appendChild(time); row.appendChild(right);
        g.appendChild(row);
      });
      el.appendChild(g);
    });
  }

  function toggleDone(id) {
    var a = assignments.find(function(x) { return x.id === id; });
    if (a) { a.done = !a.done; save(); render(); }
  }

  function deleteAssignment(id) {
    assignments = assignments.filter(function(x) { return x.id !== id; });
    save(); render();
  }

  function openModal() { document.getElementById('modal').classList.add('open'); document.getElementById('f-name').focus(); }
  function closeModal() {
    document.getElementById('modal').classList.remove('open');
    document.getElementById('f-name').value = '';
    document.getElementById('f-points').value = '';
  }

  function saveAssignment() {
    var name = document.getElementById('f-name').value.trim();
    var date = document.getElementById('f-date').value;
    if (!name || !date) { alert('Please enter a name and due date'); return; }
    assignments.push({
      id: Date.now(),
      name: name,
      cls: document.getElementById('f-class').value,
      date: date,
      time: document.getElementById('f-time').value,
      priority: document.getElementById('f-priority').value,
      points: document.getElementById('f-points').value || '',
      done: false,
      source: 'manual'
    });
    save(); closeModal(); render();
  }

  document.getElementById('modal').addEventListener('click', function(e) { if (e.target===this) closeModal(); });
  render();
</script>
</body>
</html>
